<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { --accent: #e53935; }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        font-family: system-ui, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        color: #1f2328;
      }
      h1 { font-size: 14px; margin: 0 0 4px; }
      #title {
        font-size: 12px;
        color: #444;
        font-weight: 600;
        margin-bottom: 2px;
        max-height: 34px;
        overflow: hidden;
      }
      #url {
        font-size: 11px;
        color: #888;
        word-break: break-all;
        margin-bottom: 12px;
        max-height: 30px;
        overflow: hidden;
      }
      label { font-size: 11px; color: #57606a; display: block; margin-bottom: 4px; }
      select {
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        background: #fff;
        margin-bottom: 12px;
      }
      select:disabled { background: #f0f1f3; color: #999; }
      button {
        width: 100%;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
      button:hover { background: #d32f2f; }
      button:disabled { background: #f1a9a7; cursor: default; }
      #status { margin-top: 10px; font-size: 12px; text-align: center; min-height: 16px; }
      .ok { color: #1e8449; }
      .err { color: var(--accent); }
      .muted { color: #888; }
      .capture-row {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #eee;
      }
      .switch {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .switch input { width: 16px; height: 16px; accent-color: var(--accent); }
      .hint { font-size: 11px; color: #999; margin-top: 4px; }
      #grablist { margin-top: 8px; max-height: 220px; overflow-y: auto; }
      .grab-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 4px 2px;
        border-bottom: 1px solid #f0f0f0;
      }
      .grab-item span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #grabdl { margin-top: 8px; background: #1e8449; }
      #grabdl:hover { background: #196f3d; }
    </style>
  </head>
  <body>
    <h1>YT Downloader</h1>
    <div id="title"></div>
    <div id="url">…</div>

    <label for="quality">Quality</label>
    <select id="quality" disabled>
      <option>Loading…</option>
    </select>

    <button id="download" disabled>Download</button>
    <div id="status"></div>

    <button id="grab" style="margin-top:8px;background:#374151;">⤓ Grab links on this page</button>
    <div id="grablist"></div>

    <div class="capture-row">
      <label class="switch">
        <input type="checkbox" id="capture" />
        <span>Capture browser downloads</span>
      </label>
      <div class="hint">Sends files you download (zip, pdf, music, movies…) to the app.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
